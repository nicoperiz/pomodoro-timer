<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="status-text">Sessione Lavoro</h1>
        
        <div class="timer-container">
            <svg class="progress-ring" width="300" height="300">
                <circle class="progress-ring__circle" stroke="#42da70" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
            </svg>
            <div class="timer-display" id="timer">25:00</div>
        </div>

        <div class="settings">
            <div class="input-group">
                <label for="work-input">Lavoro (min)</label>
                <input type="number" id="work-input" value="25" min="1" max="60">
            </div>
            <div class="input-group">
                <label for="break-input">Pausa (min)</label>
                <input type="number" id="break-input" value="5" min="1" max="60">
            </div>
        </div>

        <div class="controls">
            <button class="btn-start" id="start">Start</button>
            <button id="pause">Pause</button>
            <button class="btn-reset" id="reset">Reset</button>
        </div>
    </div>

    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script src="script.js"></script>
</body>
</html>
